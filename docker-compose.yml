services:

  # ── Ollama: local embedding model ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: second-brain-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama model puller: runs once, pulls nomic-embed-text ─────
  ollama-setup:
    image: ollama/ollama:latest
    container_name: second-brain-ollama-setup
    profiles: ["setup"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "ollama pull nomic-embed-text && echo 'Model ready'"
    restart: "no"

  # ── ChromaDB: local vector database ───────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: second-brain-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  # ── Indexer: on-demand full vault index (not started by `compose up`) ──
  # Run: make index   or   docker compose run --rm indexer
  # Profile avoids re-indexing thousands of files on every restart when Chroma already has data.
  indexer:
    profiles: ["index"]
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: second-brain-indexer
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_healthy
    volumes:
      - ${VAULT_PATH}:/vault:ro
    environment:
      - VAULT_PATH=/vault
      - CHROMA_HOST=http://chroma:8000
      - OLLAMA_HOST=http://ollama:11434
      - EMBED_MODEL=nomic-embed-text
    restart: "no"

  # ── Watcher: monitors vault and auto re-indexes on changes ─────
  watcher:
    build:
      context: ./watcher
      dockerfile: Dockerfile
    container_name: second-brain-watcher
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_healthy
    volumes:
      - ${VAULT_PATH}:/vault:ro
    environment:
      - VAULT_PATH=/vault
      - CHROMA_HOST=http://chroma:8000
      - OLLAMA_HOST=http://ollama:11434
      - EMBED_MODEL=nomic-embed-text

  # ── MCP Server: exposes vault tools to Claude Code ─────────────
  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    container_name: second-brain-mcp
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_healthy
    ports:
      - "${MCP_PORT:-3777}:3777"
    volumes:
      - ${VAULT_PATH}:/vault
    environment:
      - VAULT_PATH=/vault
      - CHROMA_HOST=http://chroma:8000
      - OLLAMA_HOST=http://ollama:11434
      - EMBED_MODEL=nomic-embed-text
      - TOP_K_RESULTS=3
      - PORT=3777
      - MCP_SECRET=${MCP_SECRET:-}

volumes:
  ollama_data:
  chroma_data:
