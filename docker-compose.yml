services:

  # ── Ollama: local embedding model ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: second-brain-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama model puller: runs once, pulls nomic-embed-text-v2-moe ─────
  ollama-setup:
    image: ollama/ollama:latest
    container_name: second-brain-ollama-setup
    profiles: ["setup"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "ollama pull nomic-embed-text-v2-moe && echo 'Model ready'"
    restart: "no"

  # ── ChromaDB: local vector database ───────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: second-brain-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  # ── Indexer: on-demand full vault index (not started by `compose up`) ──
  # Run: make index   or   docker compose run --rm indexer
  # Profile avoids re-indexing thousands of files on every restart when Chroma already has data.
  indexer:
    profiles: ["index"]
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: second-brain-indexer
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_healthy
    volumes:
      - ${VAULT_PATH}:/vault:ro
    environment:
      - VAULT_PATH=/vault
      - CHROMA_HOST=http://chroma:8000
      - OLLAMA_HOST=http://ollama:11434
      - EMBED_MODEL=nomic-embed-text-v2-moe
    restart: "no"

  # ── Watcher: monitors vault and auto re-indexes on changes ─────
  watcher:
    build:
      context: ./watcher
      dockerfile: Dockerfile
    container_name: second-brain-watcher
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_healthy
    volumes:
      - ${VAULT_PATH}:/vault:ro
    environment:
      - VAULT_PATH=/vault
      - CHROMA_HOST=http://chroma:8000
      - OLLAMA_HOST=http://ollama:11434
      - EMBED_MODEL=nomic-embed-text-v2-moe

  # ── MCP Server: exposes vault tools to Claude Code ─────────────
  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    container_name: second-brain-mcp
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_healthy
    ports:
      - "${MCP_PORT:-3777}:3777"
    volumes:
      - ${VAULT_PATH}:/vault
    environment:
      - VAULT_PATH=/vault
      - CHROMA_HOST=http://chroma:8000
      - OLLAMA_HOST=http://ollama:11434
      - EMBED_MODEL=nomic-embed-text-v2-moe
      - TOP_K_RESULTS=3
      - PORT=3777
      - OAUTH_PASSWORD=${OAUTH_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRY_DAYS=${JWT_EXPIRY_DAYS:-7}
      - PUBLIC_URL=${PUBLIC_URL:-}

  # ── Backup: watcher journal (SQLite) + daily zip snapshot + copy to “iCloud drop” folder ──
  # Enable: docker compose --profile backup up -d
  # Override BRAIN_* in .env for real paths; defaults use ./.brain-local/ under the repo (see .env.example).
  backup:
    profiles: ["backup"]
    build:
      context: ./backup-service
      dockerfile: Dockerfile
    container_name: second-brain-backup
    restart: unless-stopped
    volumes:
      - ${VAULT_PATH}:/vault:ro
      # Defaults keep `docker compose` valid without BRAIN_*; override with absolute paths (e.g. iCloud folder).
      - ${BRAIN_SNAPSHOT_LOCAL_DIR:-./.brain-local/snapshots}:/snapshots/local
      - ${BRAIN_ICLOUD_BACKUP_DIR:-./.brain-local/icloud-drop}:/snapshots/icloud
      - ${BRAIN_STATE_DIR:-./.brain-local/state}:/state
    environment:
      - VAULT_PATH=/vault
      - SNAPSHOT_LOCAL_DIR=/snapshots/local
      - ICLOUD_BACKUP_DIR=/snapshots/icloud
      - STATE_DB_PATH=/state/backup_state.sqlite
      - BACKUP_SNAPSHOT_TIME=${BACKUP_SNAPSHOT_TIME:-23:59}
      - BACKUP_RETENTION_LOCAL_DAYS=${BACKUP_RETENTION_LOCAL_DAYS:-14}
      - BACKUP_RETENTION_ICLOUD_DAYS=${BACKUP_RETENTION_ICLOUD_DAYS:-30}
      - BACKUP_RETRY_COPY_INTERVAL_SEC=${BACKUP_RETRY_COPY_INTERVAL_SEC:-900}
      - BACKUP_EXCLUDE_GLOBS=${BACKUP_EXCLUDE_GLOBS:-}
      - BACKUP_LOG_LEVEL=${BACKUP_LOG_LEVEL:-INFO}
      - BACKUP_RUN_ON_START=${BACKUP_RUN_ON_START:-false}
      - TZ=${TZ:-UTC}

volumes:
  ollama_data:
  chroma_data:
